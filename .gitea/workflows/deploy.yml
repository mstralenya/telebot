name: Deploy Telebot Stack

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t mstralenya/telebot:master .

      - name: Sync Stack Configuration and Deploy
        run: |
          mkdir -p /data/stacks/telebot
          cp deploy/compose.yaml /data/stacks/telebot/compose.yaml
          touch /data/stacks/telebot/.env
          grep -q "^WEBAPP_BASE_URL=" /data/stacks/telebot/.env || echo "WEBAPP_BASE_URL=https://telebot.foobar.cfd" >> /data/stacks/telebot/.env
          sed -i 's|^WEBAPP_BASE_URL=.*|WEBAPP_BASE_URL=https://telebot.foobar.cfd|' /data/stacks/telebot/.env
          cd /data/stacks/telebot
          docker compose -p telebot --env-file /data/stacks/telebot/.env up -d --force-recreate --remove-orphans
